# ReachForge configuration
# All settings are optional. Uncomment and fill in what you need.

# default_workspace: ~/reach-workspace

# === Platform API Keys ===
# devto_api_key: your-key
# postiz_api_key: your-key
# hashnode_api_key: your-key
# hashnode_publication_id: your-id
# github_token: your-token
# github_owner: your-user
# github_repo: your-repo
# github_discussion_category: General
# gemini_api_key: your-key

# === LLM Settings ===
# llm_adapter: claude            # claude, gemini, codex
